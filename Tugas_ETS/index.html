<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Stay WithMe — Discover handpicked hotels worldwide. Book effortlessly. Travel beautifully. Modern hotel booking with a clean, minimalist experience." />
  <meta name="keywords" content="hotel booking, travel, accommodation, luxury hotels, Stay WithMe" />
  <meta name="author" content="Stay WithMe" />
  <meta name="theme-color" content="#1a1a2e" />
  
  <title>Stay WithMe — Find Your Perfect Stay</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Stylesheets (order matters: tokens → reset → components → pages → responsive) -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <!-- Favicon (inline SVG data URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>◆</text></svg>" />
</head>
<body>
  <!-- App Shell -->
  <div id="app">
    <!-- Fixed Header (rendered by Header component) -->
    <header class="site-header" id="site-header"></header>

    <!-- Page Content (rendered by Router) -->
    <main id="page-content"></main>
  </div>

  <!-- JS: Load order matters — utilities first, then data, components, pages, app last -->
  <!-- Utilities -->
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/storage.js"></script>
  <script src="js/utils/router.js"></script>

  <!-- Mock Data -->
  <script src="js/data/hotels.js"></script>

  <!-- Components -->
  <script src="js/components/toast.js"></script>
  <script src="js/components/skeleton.js"></script>
  <script src="js/components/header.js"></script>
  <script src="js/components/roomCard.js"></script>
  <script src="js/components/footer.js"></script>

  <!-- Pages -->
  <script src="js/pages/home.js"></script>
  <script src="js/pages/results.js"></script>
  <script src="js/pages/roomDetail.js"></script>
  <script src="js/pages/booking.js"></script>
  <script src="js/pages/payment.js"></script>
  <script src="js/pages/confirmation.js"></script>
  <script src="js/pages/wishlist.js"></script>
  <script src="js/pages/history.js"></script>

  <!-- App Init (must be last) -->
  <script src="js/app.js"></script>
</body>
</html>
